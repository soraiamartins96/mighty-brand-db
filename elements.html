<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mighty — Elements</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="_shared.css">
  <style>
    .grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
    .el-card { background: white; border: 2px solid var(--jet); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; transition: transform .1s, box-shadow .1s; }
    .el-card:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0 var(--spark); }
    .el-card .stage { background:
        repeating-conic-gradient(#f3f3f3 0% 25%, transparent 0% 50%) 50% / 14px 14px;
      display: flex; align-items: center; justify-content: center; padding: 24px; min-height: 180px; max-height: 280px; }
    .el-card .stage img { max-width: 100%; max-height: 220px; object-fit: contain; display: block; }
    .el-card .stage.bg-jet { background-color: var(--jet); background-image:
      repeating-conic-gradient(rgba(255,255,255,0.04) 0% 25%, transparent 0% 50%); }
    .el-card .stage .html-render { display: flex; align-items: center; justify-content: center; }
    .el-card .body { padding: 12px 14px; border-top: 2px solid var(--jet); }
    .el-card .name { font-size: 13px; font-weight: 800; text-transform: uppercase; line-height: 1; margin-bottom: 4px; }
    .el-card .id-row { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--grey-3); margin-bottom: 6px; }
    .el-card .id-row code { background: var(--grey-2); padding: 1px 5px; border-radius: 2px; color: var(--grey-4); }
    .el-card .desc { font-size: 12px; color: #333; line-height: 1.4; margin-bottom: 8px; }
    .el-card .actions { display: flex; gap: 6px; flex-wrap: wrap; padding: 10px 14px; border-top: 1px solid var(--grey-2); background: var(--grey-1); }
    .el-card .btn { padding: 5px 10px; border: 1.5px solid var(--jet); background: white; font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; text-decoration: none; color: var(--jet); border-radius: 3px; }
    .el-card .btn:hover { background: var(--spark); }
    .el-card .badge { display: inline-block; background: var(--grey-2); color: var(--jet); padding: 2px 7px; border-radius: 10px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-left: 4px; vertical-align: middle; }
    .el-card .badge.html { background: var(--spark); }

    /* Toast */
    .copy-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--jet); color: var(--mlk); padding: 10px 18px; border-radius: 40px; font-size: 13px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 200; }
    .copy-toast.show { opacity: 1; }
  </style>
</head>
<body data-page="elements">
  <div class="page">
    <header class="page-header">
      <div><h1>Graphic <span class="accent">Elements</span></h1></div>
      <p class="lede">Reusable graphic libraries. Every asset is a <strong>real SVG or HTML snippet</strong> — download or copy and paste into a block.</p>
    </header>

    <div class="toolbar">
      <div class="controls">
        <input class="search" id="search" type="search" placeholder="Search by name, id, or description…" autocomplete="off">
        <span class="stats" id="stats">Showing 0 of 0</span>
      </div>
      <div class="sub-tabs" id="sub-tabs"></div>
    </div>

    <div id="content"></div>
  </div>

  <div class="copy-toast" id="toast">Copied</div>

  <script src="_database.js"></script>
  <script src="_nav.js"></script>
  <script>
  (function () {
    const db = window.__MIGHTY_DB;
    const contentEl = document.getElementById('content');
    const searchEl = document.getElementById('search');
    const statsEl = document.getElementById('stats');
    const subTabsEl = document.getElementById('sub-tabs');
    const toast = document.getElementById('toast');
    let activeCategory = 'all';
    let query = '';

    const CATEGORIES = db.elementCategories;
    const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const matches = item => {
      if (!query) return true;
      const q = query.toLowerCase();
      return [item.id,item.name,item.description,item.figmaNodeId].filter(Boolean).join(' ').toLowerCase().includes(q);
    };

    function renderSubTabs() {
      subTabsEl.innerHTML = '';
      const all = document.createElement('button');
      all.className = 'sub-tab' + (activeCategory === 'all' ? ' active' : '');
      all.innerHTML = `All <span class="count">${db.elements.length}</span>`;
      all.onclick = () => { activeCategory = 'all'; render(); };
      subTabsEl.appendChild(all);
      for (const c of CATEGORIES) {
        const n = db.elements.filter(e => e.category === c.id).length;
        if (!n) continue;
        const btn = document.createElement('button');
        btn.className = 'sub-tab' + (activeCategory === c.id ? ' active' : '');
        btn.innerHTML = `${esc(c.label)} <span class="count">${n}</span>`;
        btn.onclick = () => { activeCategory = c.id; render(); };
        subTabsEl.appendChild(btn);
      }
    }

    function renderCard(item) {
      const card = document.createElement('div');
      card.className = 'el-card';
      const hasSvg = !!item.file && (item.file.endsWith('.svg') || item.file.endsWith('.png'));
      const hasHtml = !!item.htmlSnippet;
      const isDarkBg = item.category === 'highlighters' || (item.id || '').includes('jet') || (item.id || '').includes('emblem-spark');
      const stageClass = isDarkBg ? 'stage bg-jet' : 'stage';

      let stage;
      if (hasHtml) {
        stage = `<div class="${stageClass}"><div class="html-render">${item.htmlSnippet}</div></div>`;
      } else if (hasSvg) {
        stage = `<div class="${stageClass}"><img src="${item.file}" alt="${esc(item.name)}" loading="lazy"></div>`;
      } else {
        stage = `<div class="${stageClass}"><img src="${item.thumbnail}" alt="${esc(item.name)}" loading="lazy"></div>`;
      }

      const actions = [];
      if (hasSvg) {
        actions.push(`<a class="btn" href="${item.file}" download>Download</a>`);
        actions.push(`<button class="btn" data-action="copy-path" data-path="${item.file}">Copy path</button>`);
      }
      if (hasHtml) {
        actions.push(`<button class="btn" data-action="copy-html" data-html="${esc(item.htmlSnippet).replace(/"/g, '&quot;')}">Copy HTML</button>`);
      }
      const typeBadge = hasHtml ? '<span class="badge html">HTML</span>' : hasSvg ? '<span class="badge">SVG</span>' : '';

      card.innerHTML = `
        ${stage}
        <div class="body">
          <div class="name">${esc(item.name)}${typeBadge}</div>
          <div class="id-row">id: <code>${esc(item.id)}</code></div>
          ${item.description ? `<p class="desc">${esc(item.description)}</p>` : ''}
        </div>
        ${actions.length ? `<div class="actions">${actions.join('')}</div>` : ''}
      `;
      // Wire copy buttons
      card.querySelectorAll('[data-action]').forEach(btn => {
        btn.onclick = () => {
          if (btn.dataset.action === 'copy-path') copyValue(btn.dataset.path, 'Copied path');
          else if (btn.dataset.action === 'copy-html') copyValue(btn.dataset.html, 'Copied HTML');
        };
      });
      return card;
    }

    function render() {
      renderSubTabs();
      let list = db.elements;
      if (activeCategory !== 'all') list = list.filter(e => e.category === activeCategory);
      const filtered = list.filter(matches);
      statsEl.textContent = `Showing ${filtered.length} of ${list.length}`;
      contentEl.innerHTML = '';
      if (!filtered.length) { contentEl.innerHTML = '<div class="empty">No matches.</div>'; return; }

      if (activeCategory === 'all') {
        for (const c of CATEGORIES) {
          const items = filtered.filter(x => x.category === c.id);
          if (!items.length) continue;
          const h = document.createElement('div');
          h.className = 'group-header';
          h.innerHTML = `<h2>${esc(c.label)}</h2><span class="count-pill">${items.length}</span>`;
          contentEl.appendChild(h);
          const grid = document.createElement('div');
          grid.className = 'grid';
          items.forEach(i => grid.appendChild(renderCard(i)));
          contentEl.appendChild(grid);
        }
      } else {
        const grid = document.createElement('div');
        grid.className = 'grid';
        filtered.forEach(i => grid.appendChild(renderCard(i)));
        contentEl.appendChild(grid);
      }
    }

    let toastTimer;
    function copyValue(val, label) {
      navigator.clipboard.writeText(val).then(() => {
        toast.textContent = label || 'Copied';
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 1400);
      });
    }

    searchEl.addEventListener('input', () => { query = searchEl.value.trim(); render(); });
    render();
  })();
  </script>
  <script src="_rules-footer.js"></script>
</body>
</html>
